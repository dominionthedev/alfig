<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 100" width="320" height="100">
  <defs>
    <!-- Main brand gradient: deep violet → electric blue -->
    <linearGradient id="brandGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7C3AED"/>
      <stop offset="55%"  stop-color="#4F46E5"/>
      <stop offset="100%" stop-color="#0EA5E9"/>
    </linearGradient>

    <!-- Icon inner glow -->
    <linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#38BDF8"/>
    </linearGradient>

    <!-- Soft glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Drop shadow for the icon box -->
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#4F46E5" flood-opacity="0.35"/>
    </filter>
  </defs>

  <!-- ── Icon mark ── -->
  <!-- Rounded square background -->
  <rect x="6" y="10" width="72" height="72" rx="16" ry="16"
        fill="url(#brandGrad)" filter="url(#shadow)"/>

  <!-- Stylized "A" letterform made of config-like horizontal bars -->
  <!-- Top bar (short, centered — cap of A) -->
  <rect x="26" y="22" width="24" height="6" rx="3" fill="white" opacity="0.95"/>

  <!-- Left diagonal bar -->
  <rect x="18" y="34" width="24" height="5" rx="2.5"
        fill="url(#iconGrad)" opacity="0.9"
        transform="rotate(32 30 36.5)"/>

  <!-- Right diagonal bar -->
  <rect x="38" y="34" width="24" height="5" rx="2.5"
        fill="url(#iconGrad)" opacity="0.9"
        transform="rotate(-32 50 36.5)"/>

  <!-- Crossbar (the config "lines" motif) -->
  <rect x="24" y="50" width="36" height="5" rx="2.5" fill="white" opacity="0.85"/>

  <!-- Bottom legs -->
  <rect x="20" y="60" width="14" height="5" rx="2.5" fill="white" opacity="0.7"/>
  <rect x="50" y="60" width="14" height="5" rx="2.5" fill="white" opacity="0.7"/>

  <!-- Small accent dots (format indicators: JSON · YAML · TOML · CONF) -->
  <circle cx="27" cy="75" r="2.5" fill="#A78BFA" opacity="0.9"/>
  <circle cx="35" cy="75" r="2.5" fill="#818CF8" opacity="0.9"/>
  <circle cx="43" cy="75" r="2.5" fill="#38BDF8" opacity="0.9"/>
  <circle cx="51" cy="75" r="2.5" fill="#7DD3FC" opacity="0.9"/>

  <!-- ── Wordmark ── -->
  <text x="96" y="62"
        font-family="'SF Pro Display', 'Inter', 'Segoe UI', system-ui, sans-serif"
        font-size="42"
        font-weight="700"
        letter-spacing="-1.5"
        fill="url(#brandGrad)"
        filter="url(#glow)">alfig</text>

  <!-- Tagline -->
  <text x="98" y="80"
        font-family="'SF Pro Text', 'Inter', 'Segoe UI', system-ui, sans-serif"
        font-size="12"
        font-weight="400"
        letter-spacing="2.5"
        fill="#94A3B8"
        text-anchor="start">UNIFIED CONFIG</text>
</svg>
